<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مجموعة متاجر الرعدي العالمية الملكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary-gold: #ffb300; --gold-glow: 0 0 15px rgba(255, 179, 0, 0.4); --bg-dark-heavy: #08090c; --bg-card-dark: #11141d; --text-muted: #8e94a5; --danger-color: #ff3333; --success-color: #00e676; --info-color: #00b0ff; --btn-active-glow: 0 0 10px rgba(255, 179, 0, 0.8); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; transition: all 0.2s ease; }
        body { background-color: var(--bg-dark-heavy); color: #ffffff; min-height: 100vh; overflow-x: hidden; }
        button, .cat-btn { cursor: pointer; position: relative; }
        button:active, .cat-btn:active { transform: scale(0.95); box-shadow: var(--btn-active-glow) !important; filter: brightness(1.2); }
        .marquee-container { background: linear-gradient(90deg, #000, #131007, #000); border-bottom: 1px solid var(--primary-gold); padding: 10px 0; overflow: hidden; display: flex; width: 100%; }
        .marquee-wrapper { display: flex; width: max-content; }
        .marquee-text { font-weight: 900; font-size: 14px; color: #fff; text-shadow: var(--gold-glow); animation: marqueeEffect 25s linear infinite; padding-left: 50px; white-space: nowrap; }
        .marquee-text span { color: var(--primary-gold); margin: 0 20px; }
        @keyframes marqueeEffect { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-50%, 0, 0); } }
        .global-navbar { background-color: #030406; padding: 15px 4%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--primary-gold); box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        .brand-logo { display: flex; align-items: center; gap: 12px; }
        .falcon-svg { width: 50px; height: 50px; filter: drop-shadow(0 0 6px var(--primary-gold)); }
        .brand-logo h1 { font-size: 22px; font-weight: 900; color: #fff; }
        .brand-logo h1 span { color: var(--primary-gold); text-shadow: var(--gold-glow); }
        .nav-controls { display: flex; align-items: center; gap: 12px; }
        .admin-nav-btn { background: rgba(0, 230, 118, 0.1); border: 1px solid var(--success-color); color: var(--success-color); padding: 8px 16px; border-radius: 50px; font-size: 13px; font-weight: 700; display: none; }
        .user-badge { background: rgba(255, 179, 0, 0.07); border: 1px solid var(--primary-gold); padding: 6px 14px; border-radius: 50px; font-size: 13px; font-weight: 700; color: var(--primary-gold); }
        .floating-cart-trigger { position: fixed; bottom: 30px; left: 30px; background: linear-gradient(135deg, #ffe082, var(--primary-gold)); color: #000; border: none; width: 60px; height: 60px; border-radius: 50%; box-shadow: var(--gold-glow); z-index: 1500; display: flex; justify-content: center; align-items: center; font-size: 24px; }
        .floating-chat-trigger { position: fixed; bottom: 105px; left: 30px; background: linear-gradient(135deg, #00b0ff, #0091ea); color: #fff; border: none; width: 60px; height: 60px; border-radius: 50%; box-shadow: 0 0 15px rgba(0,176,255,0.4); z-index: 1500; display: flex; justify-content: center; align-items: center; font-size: 24px; }
        .cart-badge-count { position: absolute; top: -2px; right: -2px; background: var(--danger-color); color: #fff; font-size: 12px; font-weight: 900; width: 22px; height: 22px; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 2px solid var(--bg-dark-heavy); }
        .chat-alert-badge { display: none; position: absolute; top: -2px; right: -2px; background: red; width: 15px; height: 15px; border-radius: 50%; border: 2px solid #000; }
        .category-container { padding: 20px 4% 10px; }
        .category-title { font-size: 18px; font-weight: 800; margin-bottom: 15px; border-right: 4px solid var(--primary-gold); padding-right: 10px; }
        .category-tabs { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; }
        .cat-btn { padding: 10px 24px; background: var(--bg-card-dark); border: 1px solid #252936; color: #fff; border-radius: 50px; font-weight: 700; white-space: nowrap; }
        .cat-btn.active, .cat-btn:hover { background: linear-gradient(135deg, #ffe082, var(--primary-gold)); color: #000; font-weight: 900; box-shadow: var(--gold-glow); }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px 4%; }
        .product-card { background: var(--bg-card-dark); border: 1px solid #232736; border-radius: 18px; padding: 15px; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        .stock-badge { position: absolute; top: 10px; right: 10px; padding: 3px 8px; border-radius: 8px; font-size: 11px; font-weight: 900; z-index: 10; }
        .stock-in { background: rgba(0, 230, 118, 0.15); color: var(--success-color); border: 1px solid var(--success-color); }
        .stock-out { background: rgba(255, 61, 0, 0.15); color: var(--danger-color); border: 1px solid var(--danger-color); }
        .offer-pulse-badge { position: absolute; top: 10px; left: 10px; background: var(--danger-color); color: #fff; font-size: 11px; font-weight: 900; padding: 3px 8px; border-radius: 8px; z-index: 10; animation: pulseGlow 1s infinite alternate; }
        @keyframes pulseGlow { 0% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 5px red; } 100% { transform: scale(1.08); opacity: 1; box-shadow: 0 0 15px red; } }
        .image-wrapper { width: 100%; height: 180px; background: #fff; border-radius: 12px; display: flex; justify-content: center; align-items: center; padding: 8px; }
        .image-wrapper img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .product-title { font-size: 15px; font-weight: 700; height: 45px; overflow: hidden; margin-top: 10px; }
        .spec-item { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
        .price-section { margin: 10px 0; text-align: center; background: rgba(255,255,255,0.02); padding: 6px; border-radius: 8px; }
        .current-price { color: var(--primary-gold); font-weight: 900; font-size: 18px; }
        .quantity-controller { display: flex; justify-content: space-between; align-items: center; background: #090a0d; padding: 4px; border-radius: 10px; margin-bottom: 8px; }
        .qty-action-btn { width: 30px; height: 30px; background: #1f2230; color: #fff; border: none; border-radius: 6px; font-weight: bold; }
        .action-button { width: 100%; padding: 12px; background: linear-gradient(135deg, #ffe082, var(--primary-gold)); color: #000; border: none; border-radius: 10px; font-weight: 800; box-shadow: var(--gold-glow); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 2500; justify-content: center; align-items: center; padding: 15px; }
        .modal-card { background: var(--bg-card-dark); border: 2px solid var(--primary-gold); padding: 25px; border-radius: 24px; width: 100%; max-width: 550px; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 12px; text-align: right; }
        .form-group label { display: block; font-size: 12px; color: var(--primary-gold); margin-bottom: 4px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #11131a; border: 1px solid #232736; border-radius: 8px; color: #fff; outline: none; }
        .invoice-box { background: #fff; color: #000; padding: 25px; border-radius: 16px; border: 4px double #111; font-size: 14px; margin-top: 15px; }
        .invoice-header { text-align: center; border-bottom: 3px solid #000; padding-bottom: 10px; margin-bottom: 15px; }
        .invoice-table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        .invoice-table th, .invoice-table td { border: 1px solid #ddd; padding: 8px; text-align: right; }
        .invoice-terms { background: #fff3e0; border-right: 5px solid #ff9100; padding: 10px; margin-top: 15px; font-size: 11px; font-weight: bold; }
        .btn-sm { padding: 6px 12px; border-radius: 6px; border: none; font-size: 11px; font-weight: bold; color: #fff; }
        .auth-overlay { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .auth-panel { background: var(--bg-card-dark); padding: 35px 25px; border-radius: 24px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #232736; box-shadow: var(--gold-glow); }
    </style>
</head>
<body>

    <div id="authContainer" class="auth-overlay">
        <div class="auth-panel">
            <h2 id="authHeading" style="margin-bottom: 20px; font-weight: 900;">بوابة دخول <span>الرعدي</span></h2>
            <div class="form-group"><label>البريد الإلكتروني</label><input type="email" id="inputEmail" placeholder="example@mail.com"></div>
            <div class="form-group"><label>اسم المستخدم</label><input type="text" id="inputUsername" placeholder="اسم المستخدم"></div>
            <div class="form-group"><label>كلمة المرور</label><input type="password" id="inputPassword" placeholder="••••••••••"></div>
            <button class="action-button" onclick="processAuth()">دخول آمن للمتجر ✨</button>
            <p style="margin-top: 15px; font-size: 13px; color: var(--text-muted);">
                <a id="switchAuthLink" onclick="toggleAuth()" style="color: var(--primary-gold); cursor: pointer; font-weight: bold; text-decoration: underline;">اضغط هنا لتبديل الوضع</a>
            </p>
        </div>
    </div>

    <div id="storeContainer" style="display: none;">
        <nav class="global-navbar">
            <div class="brand-logo">
                <h1>الرعدي <span>أونلاين</span></h1>
            </div>
            <div class="nav-controls">
                <div class="user-badge" id="usernameDisplay"></div>
            </div>
        </nav>
        <div class="category-container">
            <div class="category-tabs" id="categoryTabsWrapper"></div>
        </div>
        <main class="products-grid" id="mainProductsGrid"></main>
    </div>

    <script>
        // إعدادات البيانات الأساسية
        if (!localStorage.getItem('alradi_products')) {
            localStorage.setItem('alradi_products', JSON.stringify([
                { name: "هاتف الرعدي الذكي برو X", category: "هواتف", price: 2999, isOffer: "yes", stock: 5, specs: "أزرق ملكي", img: "https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=500" }
            ]));
        }
        if (!localStorage.getItem('alradi_users')) {
            localStorage.setItem('alradi_users', JSON.stringify([{ username: 'client', email: 'client@mail.com', pass: '123' }]));
        }

        let isSignUp = false;
        function toggleAuth() {
            isSignUp = !isSignUp;
            document.getElementById('authHeading').innerText = isSignUp ? "تسجيل مستخدم جديد" : "بوابة دخول الرعدي";
        }

        function processAuth() {
            const email = document.getElementById('inputEmail').value.trim();
            const username = document.getElementById('inputUsername').value.trim();
            const pass = document.getElementById('inputPassword').value.trim();

            if(!email || !username || !pass) return alert('يرجى ملء كافة الحقول!');
            
            // تصحيح منطق الدخول: استرجاع المصفوفة بشكل صحيح
            let users = JSON.parse(localStorage.getItem('alradi_users')) || [];

            if (isSignUp) {
                if (users.find(u => u.username === username)) return alert('المستخدم موجود مسبقاً!');
                users.push({ username, email, pass });
                localStorage.setItem('alradi_users', JSON.stringify(users));
                alert('تم التسجيل بنجاح!');
                isSignUp = false;
            } else {
                // دخول المدير
                if (username === 'admin' && email === 'alradi@admin.com' && pass === 'Alradi@2026') {
                    startStore();
                    return;
                }
                // دخول الزبون
                const match = users.find(u => u.username === username && u.pass === pass);
                if (match) {
                    startStore();
                } else {
                    alert('بيانات الدخول غير صحيحة!');
                }
            }
        }

        function startStore() {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('storeContainer').style.display = 'block';
            renderProducts();
        }

        function renderProducts() {
            const products = JSON.parse(localStorage.getItem('alradi_products'));
            const grid = document.getElementById('mainProductsGrid');
            grid.innerHTML = products.map(p => `
                <div class="product-card">
                    <div class="image-wrapper"><img src="${p.img}"></div>
                    <h4>${p.name}</h4>
                    <p class="current-price">${p.price} SR</p>
                    <button class="action-button">أضف للسلة</button>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
